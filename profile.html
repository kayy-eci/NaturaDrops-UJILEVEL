<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="src/output.css" rel="stylesheet" />
    <title>Profil</title>
  </head>
  <body class="bg-[#F9F3EE] text-[#3D1F0D]">
    <div
      class="sticky top-0 z-40 backdrop-blur bg-[#F9F3EE]/85 border-b border-[#E4D7C8]"
    >
      <div
        class="max-w-7xl mx-auto px-5 lg:px-8 h-16 flex items-center justify-between"
      >
        <a href="index.html" class="flex items-center gap-2">
          <img src="assets/logo.png" alt="NaturaDrops" class="h-11 w-11 rounded-full object-cover" />
          <div>
            <div class="font-serif text-lg leading-none text-[#3D1F0D]">
              NaturaDrops
            </div>
            <div class="text-[10px] tracking-[0.18em] uppercase text-[#7B3F1A]">
              Natural | Aromatherapy
            </div>
          </div>
        </a>
        <nav class="hidden md:flex items-center gap-1">
          <a
            href="index.html"
            class="rounded-md px-3 py-2 text-[#3D1F0D] hover:bg-[#C7B7A4]"
            >Beranda</a
          >
          <a
            href="catalog.html"
            class="rounded-md px-3 py-2 text-[#3D1F0D] hover:bg-[#C7B7A4]"
            >Katalog</a
          >
          <a
            href="index.html#edukasi"
            class="rounded-md px-3 py-2 text-[#3D1F0D] hover:bg-[#C7B7A4]"
            >Edukasi</a
          >
          <a
            href="index.html#tentang"
            class="rounded-md px-3 py-2 text-[#3D1F0D] hover:bg-[#C7B7A4]"
            >Tentang</a
          >
        </nav>
        <div class="flex items-center gap-2">
          <a
            href="cart.html"
            class="relative btn-ghost flex items-center gap-2"
          >
            <img src="assets/cart.png" alt="Keranjang" class="h-6 w-6 object-contain" />
            <span class="hidden sm:inline">Keranjang</span>
          </a>
          <div id="auth-guest" class="hidden sm:flex items-center gap-2">
            <a
              href="login.html"
              class="rounded-full px-4 py-2 text-sm font-semibold text-[#3D1F0D] hover:bg-[#C7B7A4]"
              >Login</a
            >
            <a
              href="register.html"
              class="hidden lg:inline-flex rounded-full bg-[#3D1F0D] px-4 py-2 text-sm font-semibold text-[#F9F3EE] hover:bg-[#5A2E14]"
              >Register</a
            >
          </div>
          <a
            href="profile.html"
            class="relative btn-ghost flex items-center gap-2"
          >
            <span
              id="profile-initial"
              class="flex h-6 w-6 items-center justify-center rounded-full bg-[#EBF1E5] text-xs font-semibold text-[#3D1F0D]"
              >P</span
            >
            <span id="profile-name" class="hidden lg:inline">Profil</span>
          </a>
        </div>
      </div>
    </div>

    <main class="mx-auto max-w-7xl px-5 py-12 lg:px-8">
      <div class="mb-8">
        <div class="text-xs uppercase tracking-[0.28em] text-[#7B3F1A]">
          Profil
        </div>
        <h1 class="mt-3 font-serif text-5xl text-[#3D1F0D]">Akun Saya</h1>
      </div>
      <div id="profile"></div>
    </main>

    <script src="js/auth.js"></script>
  </body>
</html>
