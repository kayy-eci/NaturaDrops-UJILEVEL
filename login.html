<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./src/output.css" />
  </head>
  <body
    class="bg-[#F9F3EE] min-h-screen flex items-center justify-center px-4 py-10"
  >
    <!-- KOTAK PUTIH GEDE HAYUKK -->
    <div
      class="w-full max-w-3xl rounded-2xl overflow-hidden shadow-2xl flex flex-col justify-center items-center mx-auto"
      style="min-height: 440px"
    >
      <!-- form -->
      <section
        class="bg-white w-full max-w-xl mx-auto px-10 py-12 flex flex-col justify-center"
      >
        <h1 class="text-3xl font-bold text-gray-900 mb-1">Welcome Back!</h1>
        <p class="text-sm text-gray-500 mb-7">
          Place where you can find your natural essential oil
        </p>

        <!-- Signin form -->
        <form class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Email</label
            >
            <input
              type="email"
              id="email"
              placeholder="your@email.com"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#5A2E14] focus:border-transparent transition"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#5A2E14] focus:border-transparent transition"
            />
          </div>

          <button
            type="button"
            onclick="login()"
            class="w-full bg-[#3D1F0D] hover:bg-[#5A2E14] text-white font-semibold py-3 rounded-lg text-sm transition-colors duration-200"
          >
            Login to NaturaDrops
          </button>
        </form>

        <!-- login fb ggugel -->
        <div class="mt-5">
          <p class="text-center text-xs text-gray-400 mb-3">or continue with</p>
          <div class="flex gap-3">
            <button
              class="flex-1 flex items-center justify-center gap-2 border border-gray-200 rounded-lg py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition"
            >
              <img src="./assets/gugel.svg" alt="Google" class="w-4 h-4" />
              <span>Continue with Google</span>
            </button>
            <button
              class="flex-1 flex items-center justify-center gap-2 border border-gray-200 rounded-lg py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition"
            >
              <img src="./assets/facebook.svg" alt="Facebook" class="w-4 h-4" />
              <span>Continue with Facebook</span>
            </button>
          </div>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">
          Don't have an account?
          <a
            href="register.html"
            class="text-[#5A2E14] font-semibold hover:underline"
            >Sign Up here</a
          >
        </p>
      </section>
    </div>
    <script src="js/auth.js" defer></script>
  </body>
</html>
